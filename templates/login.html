<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almas CRM — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 60%, #0F3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; border-radius: 20px; padding: 48px 40px;
      width: 100%; max-width: 400px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .brand { color: #C9A84C; font-size: 32px; font-weight: 800; letter-spacing: 4px; }
    .brand-sub { color: #888; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .btn-login { background: #C9A84C; color: white; border: none; padding: 12px; font-weight: 600; border-radius: 10px; }
    .btn-login:hover { background: #b8962e; color: white; }
    .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e5e7eb; }
    .form-control:focus { border-color: #C9A84C; box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    label { font-weight: 500; color: #374151; font-size: 14px; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="mb-4">
      <div class="brand">✨ ALMAS</div>
      <div class="brand-sub">Spices & Herbs CRM</div>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3 text-start">
        <label>Username</label>
        <input type="text" name="username" class="form-control mt-1" required autofocus>
      </div>
      <div class="mb-4 text-start">
        <label>Password</label>
        <input type="password" name="password" class="form-control mt-1" required>
      </div>
      {% if form.errors %}
        <div class="alert alert-danger py-2 small">Invalid username or password.</div>
      {% endif %}
      <button type="submit" class="btn btn-login w-100">Sign In</button>
    </form>
  </div>
</body>
</html>
