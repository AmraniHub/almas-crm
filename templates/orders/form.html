{% extends 'base.html' %}
{% block title %}{{ title }} — Almas CRM{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-500">Restaurant *</label>
          <select name="restaurant" class="form-select" required>
            <option value="">— Select restaurant —</option>
            {% for r in form.fields.restaurant.queryset %}
            <option value="{{ r.pk }}" {% if form.restaurant.value|slugify == r.pk|slugify %}selected{% endif %}>{{ r.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Status</label>
          <select name="status" class="form-select">
            {% for val, label in form.fields.status.choices %}
            <option value="{{ val }}" {% if form.status.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Total Amount (MAD)</label>
          <input type="number" step="0.01" name="total_amount" value="{{ form.total_amount.value|default:'0' }}" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Driver Name</label>
          <input type="text" name="driver_name" value="{{ form.driver_name.value|default:'' }}" class="form-control" placeholder="Driver's name">
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="payment_collected" id="payment_collected"
              {% if form.payment_collected.value %}checked{% endif %}>
            <label class="form-check-label" for="payment_collected">Payment Collected</label>
          </div>
        </div>
        <div class="col-12">
          <label class="form-label fw-500">Notes</label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Any delivery notes...">{{ form.notes.value|default:'' }}</textarea>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-gold px-4">Save Order</button>
        <a href="{% url 'order_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
