{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto">
  <div class="card-body p-4 text-center">
    <div style="font-size:48px">🗑️</div>
    <h5 class="mt-3">Delete {{ type|title }}?</h5>
    <p class="text-muted">Are you sure you want to delete <strong>{{ item }}</strong>? This cannot be undone.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-4">
      {% csrf_token %}
      <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
  </div>
</div>
{% endblock %}
