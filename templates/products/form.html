{% extends 'base.html' %}
{% block title %}{{ title }} — Almas CRM{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-body p-4">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-500">Product Name *</label>
          <input type="text" name="name" value="{{ form.name.value|default:'' }}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Arabic Name</label>
          <input type="text" name="name_ar" value="{{ form.name_ar.value|default:'' }}" class="form-control" dir="rtl" placeholder="الاسم بالعربية">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Category</label>
          <select name="category" class="form-select">
            {% for val, label in form.fields.category.choices %}
            <option value="{{ val }}" {% if form.category.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Price per kg (MAD)</label>
          <input type="number" step="0.01" name="price_per_kg" value="{{ form.price_per_kg.value|default:'' }}" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Current Stock (kg)</label>
          <input type="number" step="0.01" name="stock_kg" value="{{ form.stock_kg.value|default:'0' }}" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-500">Low Stock Alert at (kg)</label>
          <input type="number" step="0.01" name="low_stock_threshold" value="{{ form.low_stock_threshold.value|default:'2.0' }}" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label fw-500">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ form.description.value|default:'' }}</textarea>
        </div>
        <div class="col-12">
          <label class="form-label fw-500">Product Image</label>
          <input type="file" name="image" class="form-control" accept="image/*">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
              {% if form.is_active.value != False %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active (visible to restaurants)</label>
          </div>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-gold px-4">Save Product</button>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
